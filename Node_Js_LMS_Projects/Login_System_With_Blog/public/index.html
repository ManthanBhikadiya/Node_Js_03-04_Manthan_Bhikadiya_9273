<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen font-sans">

    <div id="auth-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
            <h2 id="auth-modal-title" class="text-xl font-bold text-gray-800 mb-5">Login</h2>

            <div id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div class="flex justify-end gap-3">
                    <button onclick="showSignup()"
                        class="px-4 py-2 rounded-lg text-indigo-600 cursor-pointer hover:bg-indigo-50 text-sm font-medium transition">
                        Create Account
                    </button>
                    <button onclick="login()"
                        class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 cursor-pointer text-white text-sm font-semibold shadow transition">
                        Login
                    </button>
                </div>
            </div>

            <div id="signup-form" class="hidden">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your name"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="signup-password" placeholder="Enter your password"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
                <div class="flex justify-end gap-3">
                    <button onclick="showLogin()"
                        class="px-4 py-2 rounded-lg text-indigo-600 cursor-pointer hover:bg-indigo-50 text-sm font-medium transition">
                        Back to Login
                    </button>
                    <button onclick="signup()"
                        class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 cursor-pointer text-white text-sm font-semibold shadow transition">
                        Sign Up
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="max-w-4xl mx-auto px-4 py-8 hidden">

        <header class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-indigo-700 tracking-tight">Blog App</h1>
            <div class="flex items-center gap-4">
                <span id="user-name" class="text-gray-700 font-medium"></span>
                <button onclick="logout()"
                    class="bg-red-500 hover:bg-red-600 text-white font-semibold px-4 py-2 cursor-pointer rounded-lg shadow transition text-sm">
                    Logout
                </button>
            </div>
        </header>

        <button onclick="openModal()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2 cursor-pointer rounded-lg shadow transition mb-6">
            + New Blog
        </button>

        <div id="blogs-list" class="grid gap-6 sm:grid-cols-2"></div>
        <p id="empty-msg" class="text-center text-gray-500 mt-16 text-lg hidden">
            No blogs yet.
        </p>

        <div id="modal-overlay" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
                <h2 id="modal-title" class="text-xl font-bold  text-gray-800 mb-5">Create Blog</h2>
                <input type="hidden" id="blog-id" />

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    <input type="text" id="blog-title" placeholder="Enter blog title"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Author</label>
                    <input type="text" id="blog-author" placeholder="Enter author name"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="blog-desc" placeholder="Enter blog description" rows="4"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
                </div>

                <div class="flex justify-end gap-3">
                    <button id="btn-cancel" onclick="closeModal()"
                        class="px-4 py-2 rounded-lg border border-gray-300 text-gray-600 cursor-pointer hover:bg-gray-100 text-sm font-medium transition">
                        Cancel
                    </button>
                    <button id="btn-save" onclick="saveBlog()"
                        class="px-5 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 cursor-pointer text-white text-sm font-semibold shadow transition">
                        Save
                    </button>
                </div>
            </div>
        </div>

        <div id="toast"
            class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg transition-all duration-300 opacity-0 pointer-events-none z-50">
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
